apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  labels:
    app: web
spec:
  replicas: 1
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
    spec:
      containers:
        - name: web
          image: web-image
          imagePullPolicy: Never
          ports:
            - containerPort: 3000 # Matches the new Vite port
              name: http
          env:
            - name: NODE_ENV
              value: "development"
            - name: HOST
              value: "0.0.0.0"
            - name: PORT
              value: "3000"
          readinessProbe:
            tcpSocket:
              port: 3000
            initialDelaySeconds: 20 # Give it more time to actually bind the port
            periodSeconds: 5
            failureThreshold: 10    # Allow it to fail 10 times (50 seconds total)
          livenessProbe:
            tcpSocket:
              port: 3000
            initialDelaySeconds: 45
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: web
spec:
  selector:
    app: web
  ports:
    - port: 3000
      targetPort: 3000