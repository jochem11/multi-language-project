apiVersion: apps/v1
kind: Deployment
metadata:
  name: graphql-gateway
spec:
  selector:
    matchLabels:
      app: graphql-gateway
  template:
    metadata:
      labels:
        app: graphql-gateway
    spec:
      containers:
        - name: graphql-gateway
          image: graphql-gateway-image
          ports:
            - containerPort: 8081
---
apiVersion: v1
kind: Service
metadata:
  name: graphql-gateway
spec:
  type: LoadBalancer
  selector:
    app: graphql-gateway
  ports:
    - port: 8081
      targetPort: 8081